<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет — Управление группами (FastAPI)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/group.css">
</head>
<body class="bg-white font-sans antialiased flex flex-col min-h-screen">

  <!-- Шапка -->
  <header class="bg-indigo-200 px-6 py-3 flex items-center justify-between sticky top-0 z-10 shadow-sm">
    <a href="index.html" class="flex items-center gap-2">
      <img src="icons/icon-mini.svg" alt="Фидбэк" class="h-8 w-auto">
    </a>
    <nav class="flex items-center gap-4" aria-label="Главная навигация">
      <a href="group.html" class="nav-link active text-sm text-gray-900 font-bold transition p-2 rounded-full hover:bg-indigo-300">Управление группами</a>
      <a href="calendar.html" class="nav-link text-sm text-gray-900 font-bold transition p-2 rounded-full hover:bg-indigo-300">Календарь</a>
      <button class="p-2 hover:bg-indigo-300 rounded-full transition cursor-pointer" aria-label="Поиск">
        <img src="icons/search.svg" alt="" class="w-5 h-5" onerror="this.parentElement.innerText='⌕'">
      </button>
      <button class="p-2 hover:bg-indigo-300 rounded-full transition relative cursor-pointer" aria-label="Уведомления">
        <img src="icons/notification.svg" alt="" class="w-5 h-5" onerror="this.parentElement.innerText='🔔'">
      </button>
      <button class="p-2 hover:bg-indigo-300 rounded-full transition cursor-pointer" id="profile-btn" aria-label="Профиль" aria-expanded="false">
        <img src="icons/profile.svg" alt="" class="w-5 h-5" onerror="this.parentElement.innerText='👤'">
      </button>
      <div class="flex items-center gap-1 cursor-pointer" id="profile-name" aria-label="Открыть меню профиля">
        <span class="text-sm text-gray-900 font-bold" id="headerUserName">Загрузка...</span>
      </div>
    </nav>
  </header>

  <!-- Выпадающее меню профиля -->
  <div id="profileDropdown" class="hidden absolute right-6 top-16 mt-1 bg-white border border-gray-200 rounded shadow-lg z-50 min-w-25">
    <div class="px-4 py-2 text-sm text-gray-600 cursor-pointer hover:bg-gray-50" onclick="window.location.href='settings.html'">Настройки</div>
    <div class="px-4 py-2 text-sm text-gray-600 cursor-pointer hover:bg-gray-50 border-t border-gray-100" id="logoutBtn">Выход</div>
  </div>

  <main class="flex-1 max-w-6xl w-full mx-auto px-6 py-8">
    <!-- Секция: Управление группами -->
    <div id="sectionGroups" class="block">
      <div class="flex flex-col md:flex-row gap-10 items-start">
        <div class="flex-1">
          <h1 class="text-2xl font-semibold text-gray-800">Здравствуйте, <span id="userNameDisplay">—</span></h1>

          <div class="mt-7">
            <label class="text-sm font-medium text-gray-700">Название группы</label>
            <input type="text" id="newGroupName" class="mt-2 w-full max-w-md px-4 py-2 border border-gray-300 text-sm focus:border-orange-400 rounded" placeholder="Введите название">
            <button id="createGroupBtn" class="mt-4 bg-orange-500 hover:bg-orange-600 text-white px-6 py-2 text-sm font-medium transition shadow-sm rounded">Создать новую группу</button>
          </div>

          <div id="inviteLinksBlock" class="space-y-3 mt-7 hidden">
            <div class="flex items-center gap-4 flex-wrap">
              <span class="text-sm text-gray-700 w-32">Пригласить студентов</span>
              <input type="text" id="studentInviteField" class="flex-1 max-w-md px-3 py-1.5 bg-gray-50 border border-gray-200 text-xs text-gray-500 rounded" placeholder="ссылка появится после создания группы" readonly>
            </div>
            <div class="flex items-center gap-4 flex-wrap">
              <span class="text-sm text-gray-700 w-32">Пригласить экспертов</span>
              <input type="text" id="expertInviteField" class="flex-1 max-w-md px-3 py-1.5 bg-gray-50 border border-gray-200 text-xs text-gray-500 rounded" placeholder="ссылка появится после создания группы" readonly>
            </div>
          </div>
        </div>
        <div class="w-80 shrink-0">
          <h3 class="text-center font-bold text-gray-800 text-lg">Мои группы</h3>
          <div class="groups-scrollbar overflow-y-scroll h-[calc(90vh-20rem)] pr-2 space-y-3 mt-7" id="groupsListContainer"></div>
        </div>
      </div>
    </div>

    <!-- Секция: Детали группы -->
    <div id="sectionGroupDetails" class="hidden">
      <div class="flex items-center gap-3 mb-6 flex-wrap">
        <h2 class="text-2xl font-semibold text-gray-800">Группа <span id="currentGroupNameSpan" class="text-orange-500">—</span></h2>
        <button id="editGroupBtn" class="text-gray-400 hover:text-gray-600 transition">✎</button>
      </div>
      <div class="flex flex-col md:flex-row gap-10 items-start">
        <div class="flex-1">
          <h3 class="text-base font-semibold text-gray-700 mb-3">Участники</h3>
          <div class="border-2 border-purple-500 p-1">
            <div class="members-scrollbar overflow-y-auto max-h-80" id="membersListArea"></div>
          </div>
          <div class="flex gap-4 mt-5">
            <button id="addMemberBtn" class="flex items-center gap-2 px-5 py-2.5 border-2 border-orange-500 bg-white text-orange-600 font-medium text-sm hover:bg-orange-50 transition rounded">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              Добавить участника
            </button>
            <div class="relative">
              <button id="removeMemberBtn" class="flex items-center gap-2 px-5 py-2.5 border-2 border-orange-500 bg-white text-orange-600 font-medium text-sm hover:bg-orange-50 transition rounded">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                Удалить участника
              </button>
              <div id="removeMemberDropdown" class="hidden absolute left-0 top-full mt-1 bg-white border-2 border-orange-500 shadow-lg z-40 min-w-55 remove-dropdown-scrollbar overflow-y-auto max-h-48">
              </div>
            </div>
          </div>
        </div>
        <div class="w-80 shrink-0">
          <h3 class="text-center font-bold text-gray-800 text-lg mb-4">Мои группы</h3>
          <div class="groups-scrollbar overflow-y-auto max-h-100 pr-2 space-y-3" id="groupsListDetails"></div>
        </div>
      </div>
      <button id="backToGroupsBtn" class="mt-8 text-sm text-gray-500 hover:text-gray-800 flex items-center gap-1 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Назад к группам
      </button>
    </div>
  </main>

  <footer class="bg-indigo-200 px-2 py-2 mt-auto">
    <div class="max-w-10xl mx-auto flex items-center">
      <button class="p-1 hover:bg-indigo-300 rounded-full transition" onclick="window.location.href='index.html'">
        <img src="icons/icon.svg" alt="Иконка сервиса" class="w-10/14 h-10/14">
      </button>
    </div>
  </footer>

  <script type="module" src="js/group.js"></script>
</body>
</html>
