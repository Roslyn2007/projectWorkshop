<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет — Управление группами</title>
  <link href="css/tailwind.css" rel="stylesheet">
  <link rel="stylesheet" href="css/group.css">
  <link rel="stylesheet" href="css/notification.css">
</head>
<body class="bg-white font-sans antialiased flex flex-col min-h-screen">

  <div id="layout-header"></div>

  <main class="flex-1 max-w-6xl w-full mx-auto px-6 py-8">
    <div id="sectionGroups" class="section-content active">
      <div class="flex flex-col md:flex-row gap-10 items-start">
        <div class="flex-1">
          <h1 class="text-2xl font-semibold text-gray-800 mb-8">Здравствуйте, <span id="userNameDisplay">—</span></h1>
          <div class="flex items-center gap-4 mb-5">
            <label class="text-sm font-medium text-gray-700 whitespace-nowrap">Название группы</label>
            <input type="text" id="newGroupName" class="flex-1 max-w-md px-4 py-2 border border-gray-300 text-sm focus:border-orange-400 focus:outline-none rounded" placeholder="">
          </div>
          <div class="mb-5">
            <label class="text-sm font-medium text-gray-700 block mb-3">Выбор режима</label>
            <div class="flex flex-wrap gap-3" id="modeSelector">
              <button type="button" data-mode="expert" class="mode-btn px-5 py-2 border border-gray-300 bg-white text-gray-700 text-sm rounded hover:border-orange-500 hover:text-orange-500 transition">Экспертная оценка</button>
              <button type="button" data-mode="peer" class="mode-btn px-5 py-2 border border-gray-300 bg-white text-gray-700 text-sm rounded hover:border-orange-500 hover:text-orange-500 transition">Peer-to-peer</button>
              <button type="button" data-mode="contest" class="mode-btn px-5 py-2 border border-gray-300 bg-white text-gray-700 text-sm rounded hover:border-orange-500 hover:text-orange-500 transition">Конкурсное голосование</button>
            </div>
          </div>
          <button id="createGroupBtn" class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-2 text-sm font-medium transition shadow-sm rounded mb-8">Создать новую группу</button>
          <div id="inviteLinksBlock" class="space-y-3 hidden">
            <div class="flex items-center gap-4">
              <span class="text-sm text-gray-700 whitespace-nowrap">Пригласить студентов</span>
              <input type="text" id="studentInviteField" class="flex-1 max-w-md px-3 py-1.5 bg-gray-50 border border-gray-200 text-xs text-gray-500 rounded" placeholder="ссылка для приглашения появляется после создания группы" readonly>
            </div>
            <div class="flex items-center gap-4">
              <span class="text-sm text-gray-700 whitespace-nowrap">Пригласить эксперта</span>
              <input type="text" id="expertInviteField" class="flex-1 max-w-md px-3 py-1.5 bg-gray-50 border border-gray-200 text-xs text-gray-500 rounded" placeholder="ссылка для приглашения появляется после создания группы" readonly>
            </div>
          </div>
        </div>
        <div class="w-80 shrink-0">
          <h3 class="text-center font-bold text-gray-800 text-lg mb-4">Мои группы</h3>
          <div class="groups-scrollbar overflow-y-auto max-h-[calc(100vh-12rem)] pr-2 space-y-3" id="groupsListContainer"></div>
        </div>
      </div>
    </div>

    <div id="sectionGroupDetails" class="section-content hidden">
      <div class="flex flex-col md:flex-row gap-10 items-start">
        <div class="flex-1">
          <div class="flex items-center gap-3 mb-6 flex-wrap">
            <h2 class="text-2xl font-semibold text-gray-800">Группа <span id="currentGroupNameSpan" class="text-orange-500">—</span></h2>
            <button id="editGroupBtn" class="text-gray-400 hover:text-gray-600 transition role-organizer-only">✎</button>
          </div>
          <h3 class="text-base font-semibold text-gray-700 mb-3">Участники</h3>
          <div class="border-2 border-purple-500 p-1">
            <div class="members-scrollbar overflow-y-auto max-h-80" id="membersListArea"></div>
          </div>
          <div id="organizerActions" class="hidden mt-5 space-y-4">
            <div class="flex flex-wrap gap-4 items-start">
              <div class="space-y-2">
                <button id="addExpertBtn" class="role-btn flex items-center justify-center gap-2 px-5 py-2.5 bg-orange-500 text-white font-medium text-sm hover:bg-orange-600 transition rounded">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                  Добавить эксперта
                </button>
                <div id="expertLinkBlock" class="hidden space-y-1">
                  <input type="text" id="expertInviteLink" class="w-full max-w-md px-3 py-1.5 bg-gray-50 border border-gray-200 text-xs text-gray-500 rounded" placeholder="ссылка для приглашения" readonly>
                </div>
              </div>
              <div class="relative">
                <button id="removeMemberBtn" class="role-btn flex items-center justify-center gap-2 px-5 py-2.5 border-2 border-orange-500 bg-white text-orange-600 font-medium text-sm hover:bg-orange-50 transition rounded">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                  Удалить участника
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </button>
                <div id="removeMemberDropdown" class="hidden absolute left-0 top-full mt-1 bg-white border-2 border-orange-500 shadow-lg z-40 min-w-[220px] remove-dropdown-scrollbar overflow-y-auto max-h-48"></div>
              </div>
            </div>
            <div class="space-y-2">
              <button id="addStudentBtn" class="role-btn flex items-center justify-center gap-2 px-5 py-2.5 bg-orange-500 text-white font-medium text-sm hover:bg-orange-600 transition rounded">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Добавить участника
              </button>
              <div id="studentLinkBlock" class="hidden space-y-1">
                <input type="text" id="studentInviteLink" class="w-full max-w-md px-3 py-1.5 bg-gray-50 border border-gray-200 text-xs text-gray-500 rounded" placeholder="ссылка для приглашения" readonly>
              </div>
            </div>
            <div class="flex items-center gap-4 mt-6">
              <input type="text" id="projectLinkInput" class="flex-1 max-w-md px-3 py-2 border border-gray-300 text-sm rounded" placeholder="ссылка на проект">
              <button id="sendForReviewBtn" class="bg-orange-500 hover:bg-orange-600 text-white px-5 py-2 text-sm font-medium transition rounded">Отправить на проверку</button>
            </div>
          </div>
          <div id="expertActions" class="hidden mt-5">
            <button id="goToReviewBtn" class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-2.5 text-sm font-medium transition rounded">Перейти к проверке работ</button>
          </div>
          <div id="studentActions" class="hidden mt-5">
            <div class="flex items-center gap-4">
              <input type="text" id="studentProjectLink" class="flex-1 max-w-md px-3 py-2 border border-gray-300 text-sm rounded" placeholder="ссылка на проект">
              <button id="studentSendForReviewBtn" class="bg-orange-500 hover:bg-orange-600 text-white px-5 py-2 text-sm font-medium transition rounded">Отправить на проверку</button>
            </div>
          </div>
          <button id="backToGroupsBtn" class="mt-8 text-sm text-gray-500 hover:text-gray-800 flex items-center gap-1 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Назад к группам
          </button>
        </div>
        <div class="w-80 shrink-0">
          <h3 class="text-center font-bold text-gray-800 text-lg mb-4">Мои группы</h3>
          <div class="groups-scrollbar overflow-y-auto max-h-[calc(100vh-12rem)] pr-2 space-y-3" id="groupsListDetails"></div>
        </div>
      </div>
    </div>
  </main>

  <div id="layout-footer"></div>

  <script type="module" src="js/layout-loader.js"></script>
  <script type="module" src="js/group.js"></script>
</body>
</html>
