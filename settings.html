<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Настройки профиля — ФидбэК</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/group.css">
</head>
<body class="bg-white font-sans antialiased flex flex-col min-h-screen">

  <!-- Шапка -->
  <header class="bg-indigo-200 px-6 py-3 flex items-center justify-between sticky top-0 z-10 shadow-sm">
    <a href="index.html" class="flex items-center gap-2">
      <img src="icons/icon-mini.svg" alt="Фидбэк" class="h-8 w-auto">
    </a>
    <nav class="flex items-center gap-4" aria-label="Главная навигация">
      <a href="group.html" class="nav-link text-sm text-gray-900 font-bold transition p-2 rounded-full hover:bg-indigo-300">Управление группами</a>
      <a href="calendar.html" class="nav-link text-sm text-gray-900 font-bold transition p-2 rounded-full hover:bg-indigo-300">Календарь</a>
      <button class="p-2 hover:bg-indigo-300 rounded-full transition cursor-pointer" aria-label="Поиск">
        <img src="icons/search.svg" alt="" class="w-5 h-5" onerror="this.parentElement.innerText='⌕'">
      </button>
      <button class="p-2 hover:bg-indigo-300 rounded-full transition relative cursor-pointer" aria-label="Уведомления">
        <img src="icons/notification.svg" alt="" class="w-5 h-5" onerror="this.parentElement.innerText='🔔'">
      </button>
      <button class="p-2 hover:bg-indigo-300 rounded-full transition cursor-pointer" id="profile-btn" aria-label="Профиль" aria-expanded="false">
        <img src="icons/profile.svg" alt="" class="w-5 h-5" onerror="this.parentElement.innerText='👤'">
      </button>
      <div class="flex items-center gap-1 cursor-pointer" id="profile-name" aria-label="Открыть меню профиля">
        <span class="text-sm text-gray-900 font-bold" id="headerUserName">Загрузка...</span>
      </div>
    </nav>
  </header>

  <!-- Выпадающее меню профиля -->
  <div id="profileDropdown" class="hidden absolute right-6 top-16 mt-1 bg-white border border-gray-200 rounded shadow-lg z-50 w-35">
    <div class="px-4 py-2 text-sm text-gray-600 cursor-pointer hover:bg-gray-50" onclick="window.location.href='settings.html'">Настройки</div>
    <div class="px-4 py-2 text-sm text-gray-600 cursor-pointer hover:bg-gray-50 border-t border-gray-100" id="logoutBtn">Выход</div>
  </div>

  <main class="flex-1 max-w-6xl w-full mx-auto px-6 py-8">

    <h1 class="text-2xl font-semibold text-gray-800 mb-6">Настройки профиля</h1>

    <!-- Табы -->
    <div class="border-b border-gray-200 flex gap-6 mb-6">
      <button class="settings-tab pb-2 text-sm font-medium text-orange-500 border-b-2 border-orange-500 transition" data-tab="personal">Личные данные</button>
      <button class="settings-tab pb-2 text-sm font-medium text-gray-500 border-b-2 border-transparent hover:text-gray-700 transition" data-tab="password">Изменить пароль</button>
    </div>

    <!-- Личные данные — ТОЛЬКО У ЭТОЙ ПАНЕЛИ active -->
    <div id="tabPersonal" class="tab-panel active max-w-md space-y-4">
      <div>
        <label class="block text-xs text-gray-600 mb-1">Фамилия</label>
        <div class="relative">
          <input type="text" id="profileLastName" class="w-full px-3 py-2 border border-gray-300 text-sm rounded focus:border-orange-400 focus:outline-none">
          <span class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
          </span>
        </div>
      </div>
      <div>
        <label class="block text-xs text-gray-600 mb-1">Имя</label>
        <div class="relative">
          <input type="text" id="profileFirstName" class="w-full px-3 py-2 border border-gray-300 text-sm rounded focus:border-orange-400 focus:outline-none">
          <span class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
          </span>
        </div>
      </div>
      <div>
        <label class="block text-xs text-gray-600 mb-1">Отчество</label>
        <div class="relative">
          <input type="text" id="profilePatronymic" class="w-full px-3 py-2 border border-gray-300 text-sm rounded focus:border-orange-400 focus:outline-none" placeholder="Иванович">
          <span class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
          </span>
        </div>
      </div>
      <div>
        <label class="block text-xs text-gray-600 mb-1">Email</label>
        <div class="relative">
          <input type="email" id="profileEmail" class="w-full px-3 py-2 border border-gray-300 text-sm rounded focus:border-orange-400 focus:outline-none">
          <span class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
          </span>
        </div>
      </div>
      <button id="saveProfileBtn" class="bg-orange-500 text-white px-6 py-2 text-sm font-medium rounded hover:bg-orange-600 transition">Сохранить</button>
    </div>

    <!-- Изменить пароль — ТОЛЬКО hidden, БЕЗ active -->
    <div id="tabPassword" class="tab-panel hidden max-w-md space-y-4">
      <div>
        <label class="block text-xs text-gray-600 mb-1">Текущий пароль</label>
        <input type="password" id="currentPassword" class="w-full px-3 py-2 border border-gray-300 text-sm rounded focus:border-orange-400 focus:outline-none">
      </div>
      <div>
        <label class="block text-xs text-gray-600 mb-1">Новый пароль</label>
        <input type="password" id="newPassword" class="w-full px-3 py-2 border border-gray-300 text-sm rounded focus:border-orange-400 focus:outline-none">
      </div>
      <div>
        <label class="block text-xs text-gray-600 mb-1">Подтвердите новый пароль</label>
        <input type="password" id="confirmPassword" class="w-full px-3 py-2 border border-gray-300 text-sm rounded focus:border-orange-400 focus:outline-none">
      </div>
      <button id="changePasswordBtn" class="bg-orange-500 text-white px-6 py-2 text-sm font-medium rounded hover:bg-orange-600 transition">Изменить пароль</button>
    </div>

  </main>

  <!-- Подвал -->
  <footer class="bg-indigo-200 px-2 py-2 mt-auto">
    <div class="max-w-10xl mx-auto flex items-center">
      <button class="p-1 hover:bg-indigo-300 rounded-full transition" onclick="window.location.href='index.html'">
        <img src="icons/icon.svg" alt="Иконка сервиса" class="w-10/14 h-10/14">
      </button>
    </div>
  </footer>

  <script type="module" src="js/settings.js"></script>
</body>
</html>
