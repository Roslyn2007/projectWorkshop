<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оценка проекта — ФидбэК</title>
  <link href="css/tailwind.css" rel="stylesheet">
  <link rel="stylesheet" href="css/notification.css">
  <link rel="stylesheet" href="css/review-detail.css">
</head>
<body class="bg-white font-sans antialiased flex flex-col min-h-screen">

  <div id="layout-header"></div>

  <main class="flex-1 max-w-4xl w-full mx-auto px-6 py-8">
    <h1 class="text-2xl font-semibold text-gray-800 mb-2">Проект <span id="projectName" class="text-orange-500">*Название проекта*</span></h1>
    <div class="mb-6">
      <a href="#" id="projectDownloadLink" class="text-purple-600 text-sm hover:underline break-all">*ссылка для скачивания проекта*</a>
    </div>
    <div class="mb-6">
      <label class="block text-sm text-gray-700 mb-2">Обратная связь:</label>
      <textarea id="feedbackText" rows="3" class="w-full px-3 py-2 border border-gray-300 text-sm rounded focus:border-orange-400 focus:outline-none resize-none" placeholder="Введите ваш комментарий..."></textarea>
    </div>
    <div class="flex flex-col gap-3 mb-4">
      <input type="text" id="newCriteriaInput" class="w-full px-4 py-3 border border-gray-300 text-base rounded focus:border-orange-400 focus:outline-none" placeholder="Введите название критерия...">
      <button id="addCriteriaBtn" class="self-start bg-orange-500 text-white px-5 py-2.5 rounded text-sm font-medium hover:bg-orange-600 transition inline-flex items-center gap-1.5 cursor-pointer">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Добавить критерий оценки
      </button>
    </div>
    <div class="flex items-center gap-4 mb-6 flex-wrap">
      <div class="criteria-dropdown">
        <button id="removeCriteriaBtn" class="bg-orange-500 text-white px-4 py-2 rounded text-sm font-medium inline-flex items-center gap-1.5 cursor-pointer border-none hover:bg-orange-600 transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          Удалить критерий оценки
          <svg class="w-3 h-3 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div id="removeCriteriaDropdown" class="hidden absolute left-0 top-full mt-1 bg-white border border-orange-500 rounded shadow-lg z-50 min-w-[180px] max-h-[200px] remove-dropdown-scrollbar"></div>
      </div>
    </div>
    <div id="criteriaList" class="space-y-8 mb-8"></div>
    <div class="text-center mb-6">
      <p class="text-lg font-medium text-gray-800 mb-4">Итоговый балл: <span id="totalScore" class="font-bold">**</span>/<span id="maxTotalScore" class="font-bold">**</span></p>
      <button id="finishReviewBtn" class="bg-orange-500 text-white px-8 py-2.5 rounded text-sm font-medium hover:bg-orange-600 transition cursor-pointer border-none">Завершить оценку</button>
    </div>
  </main>

  <div id="layout-footer"></div>

  <script type="module" src="js/layout-loader.js"></script>
  <script type="module" src="js/review-detail.js"></script>
</body>
</html>
